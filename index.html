        // TSP 및 생성 로직
        function tspSort(songs) {
            if (songs.length <= 1) return songs;
            const feats = ["danceability","energy","valence","tempo","acousticness","instrumentalness"];
            const dist = (a,b) => {
                const va=feats.map(f=>a[f]||0), vb=feats.map(f=>b[f]||0);
                const dot=va.reduce((s,v,i)=>s+v*vb[i],0);
                const ma=Math.sqrt(va.reduce((s,v)=>s+v*v,0)), mb=Math.sqrt(vb.reduce((s,v)=>s+v*v,0));
                return 1-(ma&&mb?dot/(ma*mb):0);
            };
            const rem=[...songs.slice(1)], res=[songs[0]];
            while(rem.length){
                const last=res[res.length-1];
                let bi=0,bd=Infinity;
                rem.forEach((s,i)=>{const d=dist(last,s);if(d<bd){bd=d;bi=i;}});
                res.push(rem.splice(bi,1)[0]);
            }
            return res;
        }

        function buildPlaylist(mood, clusterId, zPrefs) {
            const cl = MOOD_DATA[mood].clusters[clusterId];
            const seed = { track_name:cl.top3[0][0], artists:cl.top3[0][1], popularity:cl.top3[0][2], ...cl.means };
            const qs = ZSCORE_Q[mood]||[];
            qs.forEach(q=>{
                if(zPrefs[q.feat]==="hi") seed[q.feat]=Math.min(1,seed[q.feat]*1.3);
                if(zPrefs[q.feat]==="lo") seed[q.feat]=Math.max(0,seed[q.feat]*0.7);
            });
            const pool = MOOD_DATA[mood].clusters.flatMap(c=>
                c.top3.map(t=>({track_name:t[0],artists:t[1],popularity:t[2],...c.means}))
            );
            const feats=["danceability","energy","valence","tempo","acousticness","instrumentalness"];
            const sv=feats.map(f=>seed[f]||0), sm=Math.sqrt(sv.reduce((s,v)=>s+v*v,0));
            const scored=pool.map(s=>{
                const av=feats.map(f=>s[f]||0), am=Math.sqrt(av.reduce((s,v)=>s+v*v,0));
                const dot=sv.reduce((s,v,i)=>s+v*av[i],0);
                return{...s,sim:sm&&am?dot/(sm*am):0};
            }).sort((a,b)=>b.sim-a.sim);
            const artistCount={}, result=[];
            for(const s of scored){
                if(result.length>=20) break;
                if((artistCount[s.artists]||0)>=2) continue;
                artistCount[s.artists]=(artistCount[s.artists]||0)+1;
                result.push(s);
            }
            return tspSort([seed,...result.slice(0,19)]);
        }

                                        <p style={{ fontSize: 12, color: "#666" }}>{cl.desc}</p>
                                        <div style={{ borderTop: "1px solid #EEE", paddingTop: 10 }}>
                                            {cl.top3.map(([n], i) => <div key={i} style={{ fontSize: 11, color: "#999" }}>• {n}</div>)}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 스텝 2: 취향 세분화 */}
                    {step === 2 && (
                        <div style={{ textAlign: "center", maxWidth: 400, margin: "0 auto" }}>
                            <h2>세밀한 취향 조정</h2>
                            <div style={{ display: "flex", flexDirection: "column", gap: 16, margin: "30px 0" }}>
                                {ZSCORE_Q[mood].map(q => (
                                    <div key={q.feat} style={{ background: "#F9F9F9", padding: "20px", borderRadius: 12 }}>
                                        <p style={{ fontWeight: 700, marginBottom: 12 }}>{FEATURE_LABEL[q.feat]} 정도</p>
                                        <div style={{ display: "flex", gap: 8 }}>
                                            <button onClick={() => handleZPref(q.feat, "hi")} style={{ flex: 1, padding: "10px", background: zPrefs[q.feat]==="hi"?color:"#FFF", color: zPrefs[q.feat]==="hi"?"#FFF":"#000", border: "1px solid #DDD", borderRadius: 8 }}>{q.hi}</button>
                                            <button onClick={() => handleZPref(q.feat, "lo")} style={{ flex: 1, padding: "10px", background: zPrefs[q.feat]==="lo"?color:"#FFF", color: zPrefs[q.feat]==="lo"?"#FFF":"#000", border: "1px solid #DDD", borderRadius: 8 }}>{q.lo}</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={handleBuild} style={{ width: "100%", padding: "16px", background: color, color: "#FFF", border: "none", borderRadius: 40, fontWeight: 700, cursor: "pointer", fontSize: 16 }}>플레이리스트 만들기</button>
                        </div>
                    )}

                    {/* 스텝 4: 결과 화면 */}
                    {step === 4 && (
                        <div>
                            <div style={{ background: color, color: "#FFF", padding: "30px", borderRadius: 20, marginBottom: 20 }}>
                                <h2 style={{ margin: 0 }}>{mood.toUpperCase()} Playlist</h2>
                                <p style={{ opacity: 0.8 }}>{playlist.length}곡이 준비되었습니다.</p>
                                <button onClick={() => setPlaying(!playing)} style={{ background: "#FFF", color: color, border: "none", padding: "12px 24px", borderRadius: 30, fontWeight: 900, marginTop: 10 }}>{playing ? "일시정지" : "재생 시작"}</button>
                            </div>
                            <div style={{ border: "1px solid #EEE", borderRadius: 16, overflow: "hidden" }}>
                                {playlist.map((s, i) => (
                                    <div key={i} onClick={() => { setNowPlaying(i); setPlaying(true); }} style={{ padding: "12px 20px", borderBottom: "1px solid #F5F5F5", display: "grid", gridTemplateColumns: "30px 1fr 60px", alignItems: "center", cursor: "pointer", background: i === nowPlaying ? "#F0FFF0" : "#FFF" }}>
                                        <span style={{ color: i === nowPlaying ? color : "#CCC", fontWeight: 700 }}>{i + 1}</span>
                                        <div>
                                            <div style={{ fontWeight: 700, color: i === nowPlaying ? color : "#000" }}>{s.track_name}</div>
                                            <div style={{ fontSize: 12, color: "#999" }}>{s.artists}</div>
                                        </div>
                                        <div style={{ textAlign: "right", fontSize: 11, color: "#CCC" }}>{s.popularity} pop</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpotifyMoodApp />);
    </script>
</body>
</html>
