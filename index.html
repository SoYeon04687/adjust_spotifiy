<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensemble Music Recommendation</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        /* 1. 글로벌 및 폰트 설정 */
        :root {
            --font-en: 'Outfit', sans-serif;
            --font-ko: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body { 
            margin: 0; padding: 20px; 
            background-color: #F0EAE7; 
            color: #131313; 
            font-family: var(--font-ko); /* 기본 한글 폰트 */
            -webkit-font-smoothing: antialiased; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 영문 전용 폰트 적용 요소들 */
        h1, h2, .c2-name, .c2-sub, .mood-label, .hashtag, .back-btn { 
            font-family: var(--font-en); 
        }

        button { cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
        
        /* 2. 최종 앙상블 로고 스타일 (Concept B 완벽 이식) */
        .logo-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .circles-icon { position: relative; width: 80px; height: 56px; flex-shrink: 0; }
        .ci { position: absolute; width: 46px; height: 46px; border-radius: 50%; }
        .ci1 { left: 0; top: 5px; background: linear-gradient(135deg, #f093fb, #c471ed); opacity: 0.85; animation: merge-left 4s ease-in-out infinite; }
        .ci2 { left: 18px; top: 5px; background: linear-gradient(135deg, #c471ed, #9f7aea); opacity: 0.6; animation: merge-center 4s ease-in-out infinite; }
        .ci3 { left: 36px; top: 5px; background: linear-gradient(135deg, #9f7aea, #667eea); opacity: 0.5; animation: merge-right 4s ease-in-out infinite; }
        
        @keyframes merge-left { 0%, 15% { transform: translateX(0px); opacity: 0.85; } 55%, 70% { transform: translateX(18px); opacity: 0.5; } 100% { transform: translateX(0px); opacity: 0.85; } }
        @keyframes merge-center { 0%, 15% { opacity: 0.6; } 55%, 70% { opacity: 0.75; } 100% { opacity: 0.6; } }
        @keyframes merge-right { 0%, 15% { transform: translateX(0px); opacity: 0.5; } 55%, 70% { transform: translateX(-18px); opacity: 0.45; } 100% { transform: translateX(0px); opacity: 0.5; } }
        
        .text-block { display: flex; flex-direction: column; gap: 2px; }
        .c2-name { font-weight: 600; font-size: 30px; letter-spacing: 0.02em; color: #1a1a1a; }
        .c2-sub { display: flex; justify-content: space-between; align-items: center; font-weight: 300; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #888; margin-top: -4px; width: 100%; }
        
        /* 3. 공통 UI 버튼 */
        .back-btn { background: none; color: #555; border: 1px solid #131313; padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .back-btn:hover { color: #131313; background: rgba(0,0,0,0.05); }

        /* 4. 무드 카드 (Step 0) */
        .mood-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 800px; }
        .mood-card { 
            position: relative; width: 160px; height: 160px; border-radius: 28px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
            overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
            /* 나노 바나나 이미지를 넣으려면 아래처럼 추가하시면 됩니다. */
            /* background-image: url('chill_image.png'); background-size: cover; */
        }
        .mood-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 16px 32px rgba(0,0,0,0.2); }
        .mood-emoji { font-size: 40px; z-index: 2; position: relative; } /* 기존 img 대신 이모지 사용 시 */
        .mood-label { font-size: 20px; font-weight: 600; z-index: 2; position: relative; }

        /* 무드별 임시 배경색 (이미지 넣기 전) */
        .mood-chill { background: #E8DED1; color: #333; }
        .mood-happy { background: #87CEEB; color: #FFF; }
        .mood-romance { background: #4A0E17; color: #FFF; } /* 사용자님 요청 색상 반영 완료! */
        .mood-sad { background: #2C3E50; color: #FFF; }
        .mood-study { background: #C8B598; color: #FFF; }
        .mood-party { background: #1a1a1a; color: #FFF; }
        .mood-sleep { background: #0F172A; color: #FFF; }

        /* 5. 클러스터 카드 (Step 1) */
        .cluster-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
        .cluster-card { background: #FFF; border: 2px solid #DDD; border-radius: 20px; padding: 24px; text-align: left; }
        .cluster-card:hover { border-color: #c471ed; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(196,113,237,0.15); }
        .hashtag { font-size: 16px; font-weight: 800; margin-bottom: 5px; color: #9f7aea; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 데이터 영역 (사용자님 데이터 붙여넣기)
        // ==========================================
        const MOOD_DATA = {
            // !!! 여기에 기존 MOOD_DATA 내용을 통째로 붙여넣어 주세요 !!!
        };

        // 분석에 사용된 6가지 핵심 피처 목록 (오차 없이 정확하게!)
        const ALL_FEATS = ['danceability', 'energy', 'valence', 'tempo', 'acousticness', 'instrumentalness'];
        
        const FEAT_LABEL = {
            danceability: "Danceability", energy: "Energy", valence: "Valence",
            tempo: "Tempo", acousticness: "Acoustic", instrumentalness: "Instrumental"
        };

        // ==========================================
        // 2. React 메인 컴포넌트
        // ==========================================
        function App() {
            const [step, setStep] = React.useState(0);
            const [mood, setMood] = React.useState(null);

            // Step 1용: 선택한 무드의 클러스터 데이터 추출
            const availableClusters = (mood && MOOD_DATA[mood]) ? Object.values(MOOD_DATA[mood]) : [];

            // 막대 그래프용 비율 계산 함수 (상대 비율 % 계산)
            const getRelativePct = (moodKey, cId, feat) => {
                if (!MOOD_DATA[moodKey]) return 0;
                let sum = 0;
                Object.values(MOOD_DATA[moodKey]).forEach(cl => { sum += cl.avg[feat]; });
                if (sum === 0) return 0; // 파티 무드의 Instrumentalness처럼 분모가 0에 수렴할 때 방어
                const val = MOOD_DATA[moodKey][cId].avg[feat];
                return (val / sum) * 100;
            };

            return (
                <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    
                    {/* 상단 통합 로고 (Concept B) */}
                    <div className="logo-wrap">
                        <div className="circles-icon">
                            <div className="ci ci1"></div>
                            <div className="ci ci2"></div>
                            <div className="ci ci3"></div>
                        </div>
                        <div className="text-block">
                            <div className="c2-name">ENSEMBLE</div>
                            <div className="c2-sub">
                                <span>T</span><span>E</span><span>A</span><span>M</span><span>&nbsp;&nbsp;</span><span>P</span><span>R</span><span>O</span><span>J</span><span>E</span><span>C</span><span>T</span>
                            </div>
                        </div>
                    </div>

                    {step > 0 && (
                        <div style={{ marginBottom: 20, width: '100%', maxWidth: 500, textAlign: 'left' }}>
                            <button className="back-btn" onClick={() => { setStep(0); setMood(null); }}>
                                ← BACK
                            </button>
                        </div>
                    )}

                    {/* Step 0: 무드 선택 */}
                    {step === 0 && (
                        <div style={{ textAlign: 'center' }}>
                            <h2 style={{ marginBottom: 30, color: '#333' }}>What is your mood today?</h2>
                            <div className="mood-grid">
                                {[
                                    { id: "chill", label: "Chill", icon: "☕" },
                                    { id: "happy", label: "Happy", icon: "☀️" },
                                    { id: "romance", label: "Romance", icon: "✒️" }, // 깃털 펜 반영!
                                    { id: "sad", label: "Sad", icon: "🌧️" },
                                    { id: "study", label: "Study", icon: "📚" },
                                    { id: "party", label: "Party", icon: "🪩" },
                                    { id: "sleep", label: "Sleep", icon: "🌙" }
                                ].map(m => (
                                    <button key={m.id} className={`mood-card mood-${m.id}`} onClick={() => { setMood(m.id); setStep(1); }}>
                                        <div className="mood-emoji">{m.icon}</div>
                                        <div className="mood-label">{m.label}</div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Step 1: 클러스터 선택 및 6가지 지표 그래프 */}
                    {step === 1 && mood && (
                        <div className="cluster-grid">
                            <h2 style={{ textAlign: 'center', marginBottom: 20 }}>Select your vibe</h2>
                            {availableClusters.map(cl => (
                                <button key={cl.id} className="cluster-card" onClick={() => alert("다음 스텝으로 넘어갑니다!")}>
                                    <div>
                                        {cl.tags.map((tag, idx) => (
                                            <div key={idx} className="hashtag">{tag}</div>
                                        ))}
                                    </div>
                                    
                                    {/* 6가지 핵심 피처 막대 그래프 그리기 */}
                                    <div style={{ display: "flex", flexDirection: "column", gap: 10, width: "100%", marginTop: 15 }}>
                                        {ALL_FEATS.map(feat => {
                                            const pct = getRelativePct(mood, cl.id, feat);
                                            return (
                                                <div key={feat}>
                                                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#666", marginBottom: 4, fontFamily: 'Outfit' }}>
                                                        <span>{FEAT_LABEL[feat]}</span>
                                                        <span style={{ fontWeight: 600 }}>{pct.toFixed(1)}%</span>
                                                    </div>
                                                    <div style={{ background: "rgba(0,0,0,0.05)", height: 6, borderRadius: 6, overflow: "hidden" }}>
                                                        <div style={{ width: `${pct}%`, height: "100%", background: "linear-gradient(90deg, #9f7aea, #f093fb)", borderRadius: 6, transition: "width 0.5s ease" }} />
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
