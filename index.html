<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Mood - Ensemble Project</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Nunito:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin:0; padding:0; background:#F0EAE7; color:#131313; font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; }
        button { cursor:pointer; border:none; transition:all 0.2s; background:none; }

        /* ── 뒤로 버튼 ── */
        .back-btn { color:#666; border:1px solid #ccc; padding:8px 18px; border-radius:20px; font-size:13px; font-weight:500; margin-bottom:28px; display:inline-block; }
        .back-btn:hover { color:#131313; border-color:#131313; }

        /* ── 스플래시 ── */
        .splash { display:flex; flex-direction:column; align-items:center; justify-content:center; height:70vh; animation:fadeSplash 2s ease-in-out forwards; }
        @keyframes fadeSplash { 0%{opacity:0;transform:translateY(10px)} 20%{opacity:1;transform:translateY(0)} 80%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-10px)} }

        /* ── 무드 카드 ── */
        /* ── 반응형 무드 그리드 수정 ── */
        .mood-grid { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: clamp(12px, 3vw, 24px); /* 간격을 화면 크기에 따라 유연하게 */
            margin-top: 20px; 
            width: 100%;
        }

        .mood-row { 
            display: flex; 
            gap: clamp(10px, 2.5vw, 20px); 
            justify-content: center; 
            width: 100%; 
            flex-wrap: wrap; /* 중요! 화면이 좁으면 다음 줄로 넘어가게 함 */
        }

        .mood-card { 
            position: relative; 
            /* 모바일에서는 조금 더 작게, PC에서는 원래 크기로 */
            width: clamp(140px, 42vw, 160px); 
            height: clamp(140px, 42vw, 160px); 
            border-radius: 28px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            outline: none; 
        }

        /* ── 모바일 최적화 미디어 쿼리 추가 ── */
        @media (max-width: 480px) {
            .mood-row {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* 2열 세로 배열로 강제 */
                gap: 12px;
                padding: 0 10px;
            }
            .mood-card {
                width: 100%; /* 그리드 칸에 꽉 차게 */
                height: 150px;
            }
            .splash-screen h2 {
                font-size: 2rem !important; /* 글자 크기 조정 */
            }
        }
        .mood-card::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.4); opacity:0; transition:opacity 0.15s; }
        .mood-card:hover { transform:translateY(-6px) scale(1.05); box-shadow:0 18px 40px rgba(0,0,0,0.22); }
        .mood-card:hover::before { opacity:1; }
        .mood-card img { width:40px; height:40px; object-fit:contain; pointer-events:none; filter:drop-shadow(0 4px 10px rgba(0,0,0,0.2)); position:relative; z-index:1; }

        /* ── 군집 카드 ── */
        .cluster-card { background:#fff; border:2px solid #E5DED9; border-radius:20px; padding:22px 18px 20px; display:flex; flex-direction:column; gap:12px; text-align:left; width:100%; overflow:visible; }
        .cluster-card:hover { transform:translateY(-5px); }

        /* ── 해시태그 한 줄 ── */
        .tag-row { display:flex; gap:6px; flex-wrap:nowrap; overflow:hidden; }
        .hashtag { font-size:13px; font-weight:800; white-space:nowrap; }

        /* ── 피처 바 ── */
        .feat-bars { display:flex; flex-direction:column; gap:6px; }
        .feat-row  { display:flex; flex-direction:column; gap:2px; }
        .feat-head { display:flex; justify-content:space-between; font-size:11px; }
        .feat-name { font-weight:700; color:#999; }
        .feat-val  { font-weight:800; }
        .feat-bg   { height:4px; border-radius:4px; background:#EBEBEB; overflow:hidden; }
        .feat-fill { height:100%; border-radius:4px; }

        /* ── 로고 ── */
        .logo-wrap { display:flex; align-items:center; gap:14px; }
        .circles-icon { position:relative; width:80px; height:56px; flex-shrink:0; }
        .ci { position:absolute; width:46px; height:46px; border-radius:50%; }
        .ci1 { left:0; top:5px; background:linear-gradient(135deg,#f093fb,#c471ed); opacity:.85; animation:ml 4s ease-in-out infinite; }
        .ci2 { left:18px; top:5px; background:linear-gradient(135deg,#c471ed,#9f7aea); opacity:.6; animation:mc 4s ease-in-out infinite; }
        .ci3 { left:36px; top:5px; background:linear-gradient(135deg,#9f7aea,#667eea); opacity:.5; animation:mr 4s ease-in-out infinite; }
        @keyframes ml{0%,15%{transform:translateX(0);opacity:.85}55%,70%{transform:translateX(18px);opacity:.5}100%{transform:translateX(0);opacity:.85}}
        @keyframes mc{0%,15%{opacity:.6}55%,70%{opacity:.75}100%{opacity:.6}}
        @keyframes mr{0%,15%{transform:translateX(0);opacity:.5}55%,70%{transform:translateX(-18px);opacity:.45}100%{transform:translateX(0);opacity:.5}}
        .logo-text { display:flex; flex-direction:column; gap:0px; }
        .logo-name { font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:26px; letter-spacing:.02em; color:#1a1a1a; line-height:1.1; }
        .logo-sub  { font-family:'Plus Jakarta Sans',sans-serif; font-weight:300; font-size:10px; letter-spacing: normal; text-transform:uppercase; color:#aaa; margin-top:3px; display: flex; justify-content: space-between; width: 142px; }

        /* ── 중앙 정렬 화면 (취향·시드) ── */
        .center-screen { display:flex; flex-direction:column; align-items:center; text-align:center; padding:20px 0 60px; }
        .center-title  { font-family:'DM Sans',sans-serif; font-size:clamp(24px,3.5vw,36px); font-weight:900; color:#131313; margin:0 0 10px; line-height:1.25; letter-spacing:-0.3px; }
        .center-sub    { color:#999; font-size:14px; margin:0 0 44px; }
        .center-opts   { display:flex; flex-direction:column; gap:12px; width:100%; max-width:460px; }

        /* ── 취향 선택 버튼 ── */
        .q-btn { border:1.5px solid #DDD; border-radius:16px; padding:20px 24px; color:#131313; font-size:15px; font-weight:600; text-align:left; background:#fff; display:flex; align-items:center; gap:14px; }
        .q-btn:hover { transform:translateX(4px); }
        .q-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:900; flex-shrink:0; }

        /* ── 시드 버튼 ── */
        .seed-btn { border:1.5px solid #DDD; border-radius:16px; padding:22px 24px; background:#fff; display:flex; flex-direction:column; gap:4px; text-align:left; width:100%; }
        .seed-btn:hover { transform:translateX(4px); }
        .seed-label  { font-size:16px; font-weight:700; letter-spacing:0; text-transform:none; }
        .seed-name   { font-size:14px; font-weight:600; margin-top:8px; color:#555; }
        .seed-artist { font-size:13px; color:#999; margin-top:2px; }

        /* ── 플레이리스트 (퍼플 고정) ── */
        .pl-bar-bg   { background:#EBEBEB; height:5px; border-radius:5px; overflow:hidden; }
        .pl-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#9f7aea88,#9f7aea); }
    </style>
</head>

const CLUSTER_FEATURE = {chill:{0:"instrumentalness",1:"danceability",2:"valence"},happy:{0:"valence",1:"danceability",2:"instrumentalness"},romance:{0:"acousticness",1:"energy",2:"instrumentalness"},sad:{0:"acousticness",1:"tempo",2:"instrumentalness"},sleep:{0:"valence",1:"tempo",2:"acousticness"},study:{0:"instrumentalness",1:"danceability",2:"tempo"},party:{0:"tempo",1:"tempo"}};
const FEAT_LABEL = {danceability:"리듬의 일정함",energy:"에너지",valence:"밝음",tempo:"템포",acousticness:"어쿠스틱",instrumentalness:"악기의 풍부함"};
const ALL_FEATS  = ["danceability","energy","valence","tempo","acousticness","instrumentalness"];
const FEAT_Q     = {danceability:{hi:"리드미컬하고 춤추기 좋은 곡",lo:"리듬감이 적고 차분한 곡"},energy:{hi:"에너지가 넘치고 강렬한 곡",lo:"에너지가 낮고 잔잔한 곡"},valence:{hi:"더 밝고 긍정적인 곡",lo:"더 감성적이고 진지한 곡"},tempo:{hi:"템포가 빠른 곡",lo:"템포가 느린 곡"},acousticness:{hi:"어쿠스틱 악기 중심의 곡",lo:"전자음이 섞인 곡"},instrumentalness:{hi:"보컬이 적은 연주 중심 곡",lo:"보컬이 포함된 곡"}};

/* ── 레이더 차트 ── */
function RadarChart({ means, accent, size=140 }) {
    const pad=22, inner=size-pad*2;
    const n=ALL_FEATS.length,cx=size/2,cy=size/2,r=inner*0.42;
    const maxV={danceability:1,energy:1,valence:1,tempo:200,acousticness:1,instrumentalness:1};
    const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
    const pt=(v,i,rad)=>[cx+rad*Math.cos(ang(i))*v,cy+rad*Math.sin(ang(i))*v];
    const webs=[0.33,0.66,1].map(lv=>ALL_FEATS.map((_,i)=>pt(1,i,r*lv)).map((p,j)=>(j===0?'M':'')+p[0].toFixed(1)+','+p[1].toFixed(1)).join('L')+'Z');
    const dpts=ALL_FEATS.map((k,i)=>pt(Math.min((means[k]||0)/maxV[k],1),i,r));
    const dpath=dpts.map((p,j)=>(j===0?'M':'')+p[0].toFixed(1)+','+p[1].toFixed(1)).join('L')+'Z';
    const gid='rg'+accent.replace('#','');
    return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} overflow="visible">
            <defs><radialGradient id={gid} cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor={accent} stopOpacity="0.3"/><stop offset="100%" stopColor={accent} stopOpacity="0.02"/></radialGradient></defs>
            {webs.map((p,i)=><path key={i} d={p} fill="none" stroke="rgba(0,0,0,0.09)" strokeWidth="0.8"/>)}
            {ALL_FEATS.map((_,i)=>{const[x,y]=pt(1,i,r);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(0,0,0,0.07)" strokeWidth="0.8"/>;})}
            <path d={dpath} fill={`url(#${gid})`} stroke={accent} strokeWidth="2" strokeLinejoin="round"/>
            {dpts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={accent} opacity="0.85"/>)}
            {ALL_FEATS.map((k,i)=>{const[x,y]=pt(1.5,i,r);return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="7" fill="#aaa" fontFamily="DM Sans,sans-serif" fontWeight="700">{FEAT_LABEL[k]}</text>;})}
        </svg>
    );
}

/* ── 피처 바 ── */
function FeatBars({ means, accent }) {
    const max={danceability:1,energy:1,valence:1,tempo:200,acousticness:1,instrumentalness:1};
    return (
        <div className="feat-bars">
            {ALL_FEATS.map(k=>{
                const pct=Math.min(((means[k]||0)/max[k])*100,100);
                return (
                    <div key={k} className="feat-row">
                        <div className="feat-head">
                            <span className="feat-name">{FEAT_LABEL[k]}</span>
                            <span className="feat-val" style={{color:accent}}>{pct.toFixed(0)}%</span>
                        </div>
                        <div className="feat-bg"><div className="feat-fill" style={{width:`${pct}%`,background:`linear-gradient(90deg,${accent}77,${accent})`}}/></div>
                    </div>
                );
            })}
        </div>
    );
}

                                loading="lazy" style={{borderRadius:16,boxShadow:"0 10px 30px rgba(0,0,0,0.1)"}}/>
                        </div>
                        <div style={{flex:"2 1 500px",display:"flex",flexDirection:"column",gap:10}}>
                            {playlist.map((s,i)=>(
                                <div key={i} onClick={()=>setNow(i)}
                                    style={{padding:"16px 20px",background:i===nowPlaying?PURPLE_LIGHT:"#FFFFFF",
                                        border:"1.5px solid",borderColor:i===nowPlaying?PURPLE:"#E5DED9",
                                        borderRadius:16,display:"grid",gridTemplateColumns:"50px 1fr",
                                        alignItems:"center",cursor:"pointer",transition:"all 0.18s",
                                        boxShadow:i===nowPlaying?`0 2px 12px ${PURPLE}22`:"none"}}>
                                    <div style={{width:40,height:40,background:i===nowPlaying?`${PURPLE}22`:"#F0EAE7",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:PURPLE,fontWeight:900,fontSize:14}}>
                                        {i===nowPlaying?"▶":i+1}
                                    </div>
                                    <div>
                                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                                            <div>
                                                <div style={{fontWeight:700,color:i===nowPlaying?PURPLE:"#131313",fontSize:15}}>{s.track_name}</div>
                                                <div style={{fontSize:12,color:"#999",marginTop:1}}>{s.artists}</div>
                                            </div>
                                            <div style={{fontSize:11,color:PURPLE,fontWeight:700,whiteSpace:"nowrap",marginLeft:12}}>
                                                {i===0?"대표곡":`${s.similarity}% 유사`}
                                            </div>
                                        </div>
                                        <div className="pl-bar-bg">
                                            <div className="pl-bar-fill" style={{width:`${s.similarity}%`}}/>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </>)}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
